<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="admin_login.title">Admin Login</title>

  <!-- Tailwind CSS (required for shared navbar/footer UI) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons + Fonts (match other pages) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/dist/phosphor.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="/static/css/styles.css?v=3" />
  <link rel="stylesheet" href="/static/css/admin-login.css?v=1" />
</head>
<body>
  <!-- Admin Navigation -->
  <div id="admin-navbar-container"></div>

  <div class="page">
    <div class="admin-login-card">
      <div class="header">
        <div class="brand">
          <div class="brand-mark">
            <img src="/images/mandir logo.jpg" alt="" />
          </div>
          <div>
            <h1 data-i18n="admin_login.main_title">Admin Login</h1>
            <div class="subtitle" data-i18n="admin_login.subtitle">Sign in to manage the temple portal</div>
          </div>
        </div>
      </div>
      <div class="content">
      <form id="loginForm">
        <div class="field">
          <label for="username" data-i18n="admin_login.username_label">Username</label>
          <div class="control">
            <i class="ph ph-user"></i>
            <input id="username" name="username" type="text" autocomplete="username" required data-i18n-attr="placeholder" data-i18n="admin_login.username_placeholder"/>
          </div>
        </div>
        <div class="field">
          <label for="password" data-i18n="admin_login.password_label">Password</label>
          <div class="control">
            <i class="ph ph-lock"></i>
            <input id="password" name="password" type="password" autocomplete="current-password" required data-i18n-attr="placeholder" data-i18n="admin_login.password_placeholder"/>
          </div>
        </div>
        <button class="btn" type="submit" data-i18n="admin_login.sign_in_button">Sign in</button>
        <div id="errorBox" class="error"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/admin-mount-navbar.js?v=1"></script>
  <script src="/static/js/admin-login.js?v=1"></script>
</body>
</html>
