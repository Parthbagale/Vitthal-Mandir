<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css?v=3">
</head>

<body class="bg-gray-100 text-gray-800">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between gap-4 mb-6">
      <h1 class="text-2xl font-bold">Visitor Counter (Today)</h1>
      <a class="px-4 py-2 rounded-full bg-orange-600 text-white font-semibold hover:bg-orange-700 transition"
        href="/Admin_home.html">Back to Dashboard</a>
    </div>

    <div class="bg-white rounded-2xl shadow p-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <div class="text-sm text-gray-600">Today's Devotees</div>
          <div class="text-4xl font-extrabold mt-1" id="count">0</div>
          <div class="text-sm text-gray-500 mt-2" id="meta"></div>
        </div>
        <div class="flex gap-3">
          <button id="refresh" type="button" class="px-4 py-2 rounded-xl border font-semibold hover:bg-gray-50 transition">Refresh</button>
          <button id="reset" type="button" class="px-4 py-2 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700 transition">Reset to 0</button>
        </div>
      </div>

      <div class="mt-6 border-t pt-5">
        <h2 class="text-lg font-semibold">Set Today's Count</h2>
        <div class="text-sm text-gray-600 mt-1">Manually update the number shown on the website footer counter.</div>

        <div class="mt-4 flex flex-col sm:flex-row gap-3 sm:items-center">
          <input id="setValue" type="number" min="0" step="1" class="w-full sm:w-64 border rounded-xl px-3 py-2" placeholder="e.g. 12450" />
          <button id="setBtn" type="button" class="px-4 py-2 rounded-xl bg-orange-600 text-white font-semibold hover:bg-orange-700 transition">Update</button>
        </div>
        <div id="setStatus" class="text-sm mt-2"></div>
      </div>

      <div id="status" class="text-sm mt-4"></div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow p-5">
      <h3 class="text-lg font-semibold">Confirm Reset</h3>
      <p class="text-sm text-gray-700 mt-2">Reset today's visitor counter to 0?</p>
      <div class="flex justify-end gap-3 mt-5">
        <button id="cancel" type="button" class="px-4 py-2 rounded-xl border font-semibold">Cancel</button>
        <button id="ok" type="button" class="px-4 py-2 rounded-xl bg-red-600 text-white font-semibold">Reset</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const API_BASE = localStorage.getItem('API_BASE') || 'http://127.0.0.1:8000';
      const token = localStorage.getItem('admin_access_token') || localStorage.getItem('adminAccessToken');
      if (!token) {
        window.location.replace('/Admin_login.html');
        return;
      }

      const countEl = document.getElementById('count');
      const metaEl = document.getElementById('meta');
      const statusEl = document.getElementById('status');
      const setStatusEl = document.getElementById('setStatus');

      const modal = document.getElementById('modal');
      const cancel = document.getElementById('cancel');
      const ok = document.getElementById('ok');

      function setStatus(msg, kind) {
        if (!statusEl) return;
        statusEl.textContent = msg || '';
        statusEl.className = 'text-sm mt-4 ' + (kind === 'error' ? 'text-red-700' : (kind === 'ok' ? 'text-green-700' : 'text-gray-700'));
      }

      function setSetStatus(msg, kind) {
        if (!setStatusEl) return;
        setStatusEl.textContent = msg || '';
        setStatusEl.className = 'text-sm mt-2 ' + (kind === 'error' ? 'text-red-700' : (kind === 'ok' ? 'text-green-700' : 'text-gray-700'));
      }

      function openModal() {
        if (!modal) return;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      }

      function closeModal() {
        if (!modal) return;
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }

      async function loadCount() {
        setStatus('Loading...', '');
        try {
          const res = await fetch(`${API_BASE}/api/visitor/today/`);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setStatus('Failed to load. Status: ' + res.status, 'error');
            return;
          }
          const c = Number(data.total_devotees || 0);
          if (countEl) countEl.textContent = c.toLocaleString();
          if (metaEl) metaEl.textContent = 'Last updated: ' + new Date().toLocaleString();
          setStatus('Ready.', 'ok');
        } catch (e) {
          setStatus('Error: ' + e.message, 'error');
        }
      }

      async function resetCount() {
        setStatus('Resetting...', '');
        try {
          const res = await fetch(`${API_BASE}/api/visitor/reset/`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setStatus('Failed: ' + (data.detail || res.status), 'error');
            return;
          }
          await loadCount();
          setStatus('Reset successfully.', 'ok');
        } catch (e) {
          setStatus('Error: ' + e.message, 'error');
        }
      }

      async function setCountExplicit(value) {
        setSetStatus('Updating...', '');
        try {
          const res = await fetch(`${API_BASE}/api/visitor/set/`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ total_devotees: value })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setSetStatus('Failed: ' + (data.detail || res.status), 'error');
            return;
          }
          await loadCount();
          setSetStatus('Updated successfully.', 'ok');
        } catch (e) {
          setSetStatus('Error: ' + e.message, 'error');
        }
      }

      const refresh = document.getElementById('refresh');
      const reset = document.getElementById('reset');
      const setBtn = document.getElementById('setBtn');
      const setValue = document.getElementById('setValue');

      if (refresh) refresh.addEventListener('click', loadCount);
      if (reset) reset.addEventListener('click', openModal);
      if (setBtn && setValue) {
        setBtn.addEventListener('click', function () {
          const v = Number(setValue.value);
          if (!Number.isFinite(v) || v < 0) {
            setSetStatus('Please enter a valid number (>= 0).', 'error');
            return;
          }
          setCountExplicit(Math.floor(v));
        });
      }
      if (cancel) cancel.addEventListener('click', closeModal);
      if (ok) ok.addEventListener('click', async function () {
        await resetCount();
        closeModal();
      });

      loadCount();
    })();
  </script>
</body>

</html>
