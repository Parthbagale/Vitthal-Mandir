<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bhakta Nivas Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-6">Test People Count Validation</h2>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Room Type</label>
            <select id="slot" class="w-full border-gray-300 rounded-md shadow-sm p-2 border">
                <option value="">--Select--</option>
                <option>Single Room</option>
                <option>Double Room</option>
                <option>Dormitory</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">No. of People</label>
            <input type="number" id="people" max="4" class="w-full border-gray-300 rounded-md shadow-sm p-2 border" />
            <p id="peopleLimitMsg" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <div class="bg-blue-50 border border-blue-200 rounded p-4 mt-6">
            <h3 class="font-semibold mb-2">Test Instructions:</h3>
            <ol class="text-sm space-y-1 list-decimal list-inside">
                <li>Select a room type</li>
                <li>Try entering more people than allowed:
                    <ul class="ml-6 mt-1 list-disc">
                        <li>Single Room: max 4 members</li>
                        <li>Double Room: max 8 members</li>
                        <li>Dormitory: max 20 members</li>
                    </ul>
                </li>
                <li>Watch the red error message appear when you exceed the limit</li>
            </ol>
        </div>
    </div>

    <script>
        const peopleInput = document.getElementById("people");
        const roomSelect = document.getElementById("slot");
        const peopleLimitMsg = document.getElementById("peopleLimitMsg");

        const ROOM_LIMITS = { 'Single Room': 4, 'Double Room': 8, 'Dormitory': 20 };

        function applyRoomLimit() {
            const room = roomSelect ? roomSelect.value : '';
            const limit = ROOM_LIMITS[room];
            if (!peopleInput) return;
            if (limit) {
                peopleInput.max = limit;
                peopleInput.disabled = false;
                if (peopleLimitMsg) {
                    peopleLimitMsg.textContent = 'Max ' + limit + ' member' + (limit > 1 ? 's' : '') + ' allowed for ' + room + '.';
                    peopleLimitMsg.className = 'text-xs text-gray-500 mt-1';
                }
                const cur = parseInt(peopleInput.value, 10);
                if (cur > limit) {
                    peopleInput.value = limit;
                }
            } else {
                peopleInput.max = '';
                peopleInput.disabled = true;
                peopleInput.value = '';
                if (peopleLimitMsg) {
                    peopleLimitMsg.textContent = 'Select a room type first.';
                    peopleLimitMsg.className = 'text-xs text-gray-500 mt-1';
                }
            }
        }

        if (roomSelect) roomSelect.addEventListener('change', applyRoomLimit);
        applyRoomLimit();

        if (peopleInput) {
            peopleInput.addEventListener('input', function() {
                const room = roomSelect ? roomSelect.value : '';
                const limit = ROOM_LIMITS[room];
                let n = parseInt(this.value, 10);
                if (isNaN(n) || n < 0) n = 0;
                if (limit && n > limit) {
                    this.value = limit;
                    n = limit;
                    if (peopleLimitMsg) {
                        peopleLimitMsg.textContent = 'Maximum ' + limit + ' member' + (limit > 1 ? 's' : '') + ' allowed for ' + room + '.';
                        peopleLimitMsg.className = 'text-xs text-red-500 mt-1 font-semibold';
                    }
                } else if (peopleLimitMsg && limit) {
                    peopleLimitMsg.textContent = 'Max ' + limit + ' member' + (limit > 1 ? 's' : '') + ' allowed for ' + room + '.';
                    peopleLimitMsg.className = 'text-xs text-gray-500 mt-1';
                }
            });
        }
    </script>
</body>
</html>
