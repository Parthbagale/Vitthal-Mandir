<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Navbar Buttons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6">Navbar Button Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Buttons</h2>
            
            <div class="space-y-4">
                <button id="registerBtn" class="bg-gray-200 text-gray-800 py-2 px-6 rounded-full font-semibold hover:bg-gray-300 transition duration-300">
                    Register
                </button>
                
                <button id="loginBtn" class="bg-orange-500 text-white py-2 px-6 rounded-full font-semibold hover:bg-orange-600 transition duration-300 ml-4">
                    Login
                </button>
            </div>
            
            <div id="status" class="mt-4 p-4 rounded hidden"></div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal-overlay" class="hidden fixed inset-0 bg-black/60 items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">Register Modal</h2>
                <button type="button" id="close-register-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="text-gray-600">This is the register modal. It should open when you click the Register button.</p>
        </div>
    </div>

    <script>
        // Test script
        const registerBtn = document.getElementById('registerBtn');
        const loginBtn = document.getElementById('loginBtn');
        const modal = document.getElementById('register-modal-overlay');
        const closeBtn = document.getElementById('close-register-modal');
        const status = document.getElementById('status');

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `mt-4 p-4 rounded ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`;
            status.classList.remove('hidden');
        }

        // Register button
        registerBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            console.log('Register button clicked');
            showStatus('Register button clicked! Opening modal...', 'success');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        });

        // Login button
        loginBtn.addEventListener('click', () => {
            console.log('Login button clicked');
            showStatus('Login button clicked! Would redirect to /login.html', 'success');
            // In real app: window.location.href = '/login.html';
        });

        // Close modal
        closeBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            showStatus('Modal closed', 'success');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        });

        console.log('✅ Test page loaded successfully');
        console.log('Register button:', registerBtn);
        console.log('Login button:', loginBtn);
    </script>
</body>
</html>
